server:
  port: 8082

spring:
  application:
    name: application_service

  datasource:
    url: jdbc:mysql://localhost:3306/application_db?useSSL=false&serverTimezone=UTC
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

jwt:
  secret: finflowsecretkeyforhs256algorithm
  expiration: 3600000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka