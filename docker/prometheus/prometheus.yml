global:
  scrape_interval: 5s

scrape_configs:
  - job_name: auth-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - auth-service:8081

  - job_name: application-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - application-service:8082

  - job_name: document-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - document-service:8083

  - job_name: admin-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - admin-service:8084

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - notification-service:8085

  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - api-gateway:8080
