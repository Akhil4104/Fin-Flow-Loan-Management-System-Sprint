server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/auth/**

            - id: application-service
              uri: http://localhost:8082
              predicates:
                - Path=/applications/**

            - id: document-service
              uri: http://localhost:8083
              predicates:
                - Path=/documents/**

            - id: admin-service
              uri: http://localhost:8084
              predicates:
                - Path=/admin/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

jwt:
  secret: finflowsecretkeyforhs256algorithm

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka